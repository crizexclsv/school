<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="tables.css">

<script src="ind.js" defer></script>
</head>
<body>
<input type="checkbox" id="menu-toggle">
<label for="menu-toggle" class="toggle">
    <span class="top_line"></span>
    <span class="middle_line"></span>
    <span class="bottom_line"></span>
</label>
<nav>
        <div class="slide">
            <h1>Menu</h1>
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i>Home</a></li>
                <li class="menu-item-has-children">
                    <a href="#" class="toggle-submenu">
                        <i class="fas fa-table"></i>Tables <i class="fas fa-chevron-right submenu-arrow"></i>
                    </a>
                    <ul class="submenu">
                        <li><a href="tables.html"><i class="fas fa-list"></i>Today's Logins</a></li>
                        <li><a href="recent tables.html"><i class="fas fa-th"></i>Recent Tables</a></li>

                    </li>

            </ul>
        </div>

<div class="Logo">
    <img src="logo.png" alt="Profile Picture">
</div>

<div class="table-container">
    <h1>TODAY'S LOGIN</h1>
    <div class="table-scroll-wrapper">
        <table class="header-table">
            <thead>
                <tr>
                    <th class="Usn">Usn</th>
                    <th class="Name">NAME</th>
                    <th class="GradeStrand">GRADE & STRAND</th>
                    <th class="Date">DATE</th>
                    <th class="In">IN</th>
                    <th class="Out">OUT</th>
                </tr>
            </thead>
        </table>
        <div class="table-body-scroll">
            <table class="body-table">
                <tbody>
                    <tr>
                        <td class="Usn"></td>
                        <td class="Name"></td>
                        <td class="GradeStrand"></td>
                        <td class="Date"></td>
                        <td class="In"></td>
                        <td class="Out"></td>
                    </tr>
                    <tr>
                        <td class="Usn"></td>
                        <td class="Name"></td>
                        <td class="GradeStrand"></td>
                        <td class="Date"></td>
                        <td class="In"></td>
                        <td class="Out"></td>
                    </tr>
                    <tr>
                        <td class="Usn"></td>
                        <td class="Name"></td>
                        <td class="GradeStrand"></td>
                        <td class="Date"></td>
                        <td class="In"></td>
                        <td class="Out"></td>
                </tbody>
            </table>
        </div>
    </div>
